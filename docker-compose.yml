services:
  mongo:
    image: mongo:7
    container_name: medisync-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: medisync-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      PORT: 5000
      JWT_SECRET: medisync_dev_secret
      MONGO_URL: mongodb://mongo:27017/medisync
      MONGO_URI: mongodb://mongo:27017/medisync

  frontend:
    build:
      context: ./frontend
    container_name: medisync-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:5000

volumes:
  mongo_data:
